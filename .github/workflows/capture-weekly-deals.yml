name: Capture weekly deal snapshots

# Runs after "Weekly Deal Cache Refresh" finishes, not on a fixed clock.
# Refresh rewrites the Supabase deal cache every Wednesday at 14:00 UTC.
# Capture used to run at 11:00 on its own timer, three hours before refresh,
# so every snapshot was last week's cache. Chaining on completion means the
# snapshot always reflects the cache refresh just wrote, no matter how long
# refresh takes.
on:
  workflow_run:
    workflows: ["Weekly Deal Cache Refresh"]
    types: [completed]
  workflow_dispatch: {}

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # workflow_run fires on completion regardless of result, so gate on success.
    # The workflow_dispatch clause keeps manual runs working (no workflow_run
    # context exists on a manual trigger).
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run weekly capture
        shell: bash
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/cron/capture-weekly-deals.js 2>&1 | tee capture.log

      - name: Upload log artifact on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: capture-log-${{ github.run_id }}
          path: capture.log
          retention-days: 14
