name: Weekly Deal Cache Refresh

on:
  schedule:
    # Every Wednesday at 6:00 AM EST (10:00 UTC)
    - cron: "0 10 * * 3"
  workflow_dispatch:

jobs:
  refresh-deals:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.repository == 'usafa09/deals-to-meals'

    steps:
      - name: Refresh deal caches for top metro areas
        run: |
          BASE="https://dishcount.co/api"
          ZIPS=(
            "45432|Dayton (Kroger, Meijer)"
            "10001|NYC (ShopRite, Stop & Shop)"
            "90210|LA (Ralphs, Vons)"
            "60601|Chicago (Mariano's, Jewel-Osco)"
            "77001|Houston (Kroger, H-E-B)"
            "30301|Atlanta (Kroger, Publix)"
            "98101|Seattle (Fred Meyer, QFC)"
            "33101|Miami (Publix)"
            "85001|Phoenix (Fry's)"
            "48201|Detroit (Kroger, Meijer)"
          )

          for entry in "${ZIPS[@]}"; do
            IFS='|' read -r zip label <<< "$entry"
            echo "::group::$label (zip $zip)"
            echo "Fetching deals for $label..."
            RESPONSE=$(curl -s -w "\n%{http_code}" --max-time 120 "$BASE/deals/regional?zip=$zip")
            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | sed '$d')
            DEAL_COUNT=$(echo "$BODY" | grep -o '"name"' | wc -l)
            echo "Status: $HTTP_CODE | Deals found: ~$DEAL_COUNT"
            if [ "$HTTP_CODE" -ne 200 ]; then
              echo "::warning::$label returned HTTP $HTTP_CODE"
            fi
            echo "::endgroup::"
            echo "Waiting 30s before next request..."
            sleep 30
          done

          # ALDI national deals
          echo "::group::ALDI (national)"
          echo "Fetching ALDI deals..."
          RESPONSE=$(curl -s -w "\n%{http_code}" --max-time 60 "$BASE/aldi/deals")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          DEAL_COUNT=$(echo "$BODY" | grep -o '"name"' | wc -l)
          echo "Status: $HTTP_CODE | Deals found: ~$DEAL_COUNT"
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::warning::ALDI returned HTTP $HTTP_CODE"
          fi
          echo "::endgroup::"

          echo "Done! All deal caches refreshed."

      - name: Extract deals for top stores (OCR pipeline)
        run: |
          BASE="https://dishcount.co/api"
          # IMPORTANT: Keep this list in sync with the STORES array in the "Verify extractions completed" step below.
          STORES=(
            "ALDI|00000|ALDI (national)"
            "Meijer|45432|Meijer (Dayton)"
            "Whole Foods|45432|Whole Foods (Dayton)"
            "Fresh Thyme|45432|Fresh Thyme (Dayton)"
            "Publix|32801|Publix (Orlando)"
            "Albertsons|90001|Albertsons (LA)"
            "Safeway|94102|Safeway (SF)"
            "Food Lion|27601|Food Lion (Raleigh)"
            "Giant Eagle|15201|Giant Eagle (Pittsburgh)"
            "Sprouts|85001|Sprouts (Phoenix)"
            "Harris Teeter|27601|Harris Teeter (Raleigh)"
            "Hy-Vee|50309|Hy-Vee (Des Moines)"
            "ShopRite|07001|ShopRite (NJ)"
            "Stop and Shop|06001|Stop and Shop (CT)"
            "Winn Dixie|32801|Winn Dixie (Orlando)"
            "Piggly Wiggly|35203|Piggly Wiggly (Birmingham)"
            "Save A Lot|45432|Save A Lot (Dayton)"
            "Grocery Outlet|94102|Grocery Outlet (SF)"
            "Market Basket|01801|Market Basket (MA)"
            "Ingles|28801|Ingles (Asheville)"
          )

          for entry in "${STORES[@]}"; do
            IFS='|' read -r store zip label <<< "$entry"
            echo "::group::$label"
            echo "Extracting $label deals..."
            RESPONSE=$(curl -s -w "\n%{http_code}" --max-time 180 -X POST "$BASE/extract-store" \
              -H "Content-Type: application/json" \
              -d "{\"storeName\":\"$store\",\"zip\":\"$zip\"}")
            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            # Deal counts reported in verification step below
            echo "Status: $HTTP_CODE"
            if [ "$HTTP_CODE" -ne 200 ]; then
              echo "::warning::$label returned HTTP $HTTP_CODE"
            fi
            echo "::endgroup::"
            echo "Waiting 10s before next extraction..."
            sleep 10
          done
          echo "Done! All store extractions triggered (results verified in next step)."

      - name: Verify extractions completed
        id: verify
        run: |
          BASE="https://dishcount.co/api"
          # Wait for in-flight extractions to settle. Last trigger was at end of
          # prior step; extractions take 2-3 min server-side, larger ones (Lidl
          # at 20 pages) up to ~5 min. 6 min gives a 1-min safety margin.
          echo "Waiting 6 minutes for extractions to settle..."
          sleep 360

          # IMPORTANT: Keep this list in sync with the trigger loop in the "Extract deals for top stores" step above.
          STORES=(
            "ALDI"
            "Meijer"
            "Whole Foods"
            "Fresh Thyme"
            "Publix"
            "Albertsons"
            "Safeway"
            "Food Lion"
            "Giant Eagle"
            "Sprouts"
            "Harris Teeter"
            "Hy-Vee"
            "ShopRite"
            "Stop and Shop"
            "Winn Dixie"
            "Piggly Wiggly"
            "Save A Lot"
            "Grocery Outlet"
            "Market Basket"
            "Ingles"
          )

          FAIL_COUNT=0
          for store in "${STORES[@]}"; do
            ENCODED=$(echo "$store" | sed 's/ /%20/g; s/&/%26/g')
            RESPONSE=$(curl -s --max-time 30 "$BASE/extract-status?store=$ENCODED")
            STATUS=$(echo "$RESPONSE" | grep -o '"status":"[^"]*"' | sed 's/.*:"//;s/"//')
            DEALS=$(echo "$RESPONSE" | grep -o '"deals":[0-9]*' | sed 's/.*://')

            case "$STATUS" in
              ready)
                if [ "${DEALS:-0}" -lt 10 ]; then
                  echo "🟡 $store: ready with only $DEALS deals (low volume)"
                  echo "::warning::$store ready but only $DEALS deals (low)"
                else
                  echo "🟢 $store: $DEALS deals"
                fi
                ;;
              extracting)
                echo "🔴 $store: still extracting after 6 min — likely stuck"
                echo "::warning::$store still extracting after 6 min — may need investigation"
                FAIL_COUNT=$((FAIL_COUNT + 1))
                ;;
              *)
                echo "🔴 $store: status=$STATUS (extraction failed or no cache row)"
                echo "::warning::$store returned status=$STATUS (extraction failed or not yet attempted)"
                FAIL_COUNT=$((FAIL_COUNT + 1))
                ;;
            esac
          done

          echo ""
          echo "Verification complete. $FAIL_COUNT chains had issues."
          echo "fail_count=$FAIL_COUNT" >> $GITHUB_OUTPUT

          if [ "$FAIL_COUNT" -gt 5 ]; then
            echo "::error::More than 5 chains failed extraction — investigate immediately"
            exit 1
          fi
