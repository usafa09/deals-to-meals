    .google-btn { width: 100%; padding: 13px; background: white; border: 2px solid var(--sand); border-radius: 12px; font-size: 15px; font-weight: 700; font-family: 'DM Sans', sans-serif; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.2s; margin-bottom: 16px; }
    .google-btn:hover { border-color: #aaa; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }

    .divider { display: flex; align-items: center; gap: 12px; margin: 16px 0; }

    .empty-state { text-align: center; padding: 24px; color: var(--muted); font-style: italic; font-size: 14px; }

    .toast { display: none; position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 12px; font-size: 14px; font-weight: 600; z-index: 300; box-shadow: 0 4px 20px rgba(0,0,0,0.2); white-space: nowrap; }
    .toast.show { display: block; animation: fadeUp 0.3s ease; }
    .toast.error   { background: var(--red); color: white; }
    .toast.success { background: var(--green-dark); color: white; }
    @keyframes fadeUp { from { opacity:0; transform: translate(-50%,10px); } to { opacity:1; transform: translate(-50%,0); } }

    .spinner-wrap { display: flex; justify-content: center; padding: 40px; }
    .spinner { width: 40px; height: 40px; border-radius: 50%; border: 4px solid #E0E0E0; border-top-color: var(--green-dark); animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: {

    persistSession: true,

const DIETARY_OPTIONS = ["Vegetarian","Gluten-Free","Dairy-Free","Low Calorie"];
const RECIPE_TYPES    = ["Quick & Easy","Healthy","Comfort Food","Family Style","Budget Max","Gourmet"];
const STORES = [
  { id:"kroger",  name:"Kroger",  emoji:"🏪", desc:"Kroger, Ralphs, Fred Meyer, King Soopers & more", available:true },
];

let currentUser  = null;
let userProfile  = null;
let savedRecipes = [];
let savedLists = [];
let activeTab    = "signin";

function showToast(msg, type="success") {
  const t = document.getElementById("toast");
  t.textContent = msg; t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove("show"), 4000);
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function initApp() {
  const params = new URLSearchParams(window.location.search);
  if (params.get("kroger") === "success") showToast("✅ Kroger account connected!");
  if (params.get("kroger") === "error")   showToast("Kroger connection failed", "error");

  // Listen for all auth state changes (handles OAuth redirects, sign-in, sign-out)
  sb.auth.onAuthStateChange(async (event, session) => {
    console.log("profile auth state change:", event, session?.user?.email);
    if (event === "SIGNED_IN" && session?.user) {
      currentUser = session.user;
      await loadProfileData();
      renderProfile();
    } else if (event === "SIGNED_OUT") {
      currentUser = null; userProfile = null; savedRecipes = [];
      renderAuth();
    }
  });

  try {
    const { data, error } = await sb.auth.getSession();
    console.log("Session data:", data?.session?.user?.email, "Error:", error);
    if (data?.session?.user) {
      currentUser = data.session.user;
      await loadProfileData();
      renderProfile();
    } else {
      // No session — redirect to login unless this is an OAuth callback
      if (!window.location.hash.includes('access_token')) {
        window.location.href = '/login.html';
        return;
      }
      renderAuth();
    }
  } catch (e) {
    console.error("Session check failed:", e);
    if (!window.location.hash.includes('access_token')) {
      window.location.href = '/login.html';
      return;
    }
    renderAuth();
  }

  // Set active tab from hash
  const hash = window.location.hash;
  if (hash === "#saved") activeProfileTab = "saved";
  else if (hash === "#lists") activeProfileTab = "lists";
  else if (hash === "#badges") activeProfileTab = "badges";
  else activeProfileTab = "profile";
}

window.addEventListener("load", initApp);

async function loadProfileData() {
  try {
    const token = (await sb.auth.getSession()).data.session?.access_token;
    const [profileRes, recipesRes, listsRes, badgesRes, statsRes] = await Promise.all([
      fetch("/api/profile",        { headers: { Authorization: `Bearer ${token}` } }),
      fetch("/api/recipes/saved",  { headers: { Authorization: `Bearer ${token}` } }),
      fetch("/api/lists",          { headers: { Authorization: `Bearer ${token}` } }),
      fetch("/api/badges",         { headers: { Authorization: `Bearer ${token}` } }),
      fetch("/api/stats",          { headers: { Authorization: `Bearer ${token}` } }),
    ]);
    if (profileRes.ok)  userProfile  = await profileRes.json();
    if (recipesRes.ok)  { const d = await recipesRes.json(); savedRecipes = d.recipes || []; }
    if (listsRes.ok)    { const d = await listsRes.json(); savedLists = d.lists || []; }
    if (badgesRes.ok)   { const d = await badgesRes.json(); userBadges = d.badges || []; }
    if (statsRes.ok)    { userStatData = await statsRes.json(); }
  } catch (err) { console.error("loadProfileData error:", err); }
}

      <button class="google-btn" onclick="signInWithGoogle()">

          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>

}

function switchTab(tab) { activeTab = tab; renderAuth(); }

async function signInWithGoogle() {
  const { error } = await sb.auth.signInWithOAuth({
    provider: "google",
    options: {
      redirectTo: window.location.origin + "/profile.html",
    },
  });
  if (error) showAuthError(error.message);
}

async function signInWithEmail() {
  const email    = document.getElementById("authEmail").value;
  const password = document.getElementById("authPassword").value;
  if (!email || !password) return showAuthError("Please fill in all fields");
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) showAuthError(error.message);
}

async function signUpWithEmail() {
  const name     = document.getElementById("authName")?.value || "";
  const email    = document.getElementById("authEmail").value;
  const password = document.getElementById("authPassword").value;
  if (!email || !password) return showAuthError("Please fill in all fields");
  if (password.length < 6) return showAuthError("Password must be at least 6 characters");
  const { error } = await sb.auth.signUp({
    email, password,
    options: {
      data: { full_name: name },
      emailRedirectTo: "https://deals-to-meals.onrender.com/profile.html",
    },
  });
  if (error) showAuthError(error.message);
  else showAuthSuccessMsg("✅ Check your email to confirm your account!");
}

function showAuthError(msg) {
  const el = document.getElementById("authError");
  el.textContent = msg; el.style.display = "block";
  setTimeout(() => el.style.display = "none", 5000);
}
function showAuthSuccessMsg(msg) {
  const el = document.getElementById("authSuccess");
  el.textContent = msg; el.style.display = "block";
}

// ── Actions ───────────────────────────────────────────────────────────────────
function toggleChip(el) { el.classList.toggle("selected"); }

async function getToken() {
  return (await sb.auth.getSession()).data.session?.access_token;
}

async function savePersonalInfo() {
  const token = await getToken();
  const res = await fetch("/api/profile", {
    method: "PATCH",
    headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
    body: JSON.stringify({
      full_name:       document.getElementById("fullName").value,
      household_size:  parseInt(document.getElementById("householdSize").value),
      preferred_store: document.getElementById("preferredStore").value,
    }),
  });
  if (res.ok) { userProfile = await res.json(); showToast("✅ Personal info saved!"); }
  else showToast("Could not save", "error");
}

async function saveDietary() {
  const token    = await getToken();
  const selected = [...document.querySelectorAll("#dietaryChips .chip.selected")].map(c => c.textContent);
  const res = await fetch("/api/profile", {
    method: "PATCH",
    headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
    body: JSON.stringify({ dietary_preferences: selected }),
  });
  if (res.ok) { userProfile = await res.json(); showToast("✅ Dietary preferences saved!"); }
  else showToast("Could not save", "error");
}

async function saveFavoriteTypes() {
  const token    = await getToken();
  const selected = [...document.querySelectorAll("#recipeTypeChips .chip.selected")].map(c => c.textContent);
  const res = await fetch("/api/profile", {
    method: "PATCH",
    headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
    body: JSON.stringify({ favorite_recipe_types: selected }),
  });
  if (res.ok) { userProfile = await res.json(); showToast("✅ Recipe preferences saved!"); }
  else showToast("Could not save", "error");
}

  modal.innerHTML = `
    <div style="background:white;border-radius:24px;max-width:580px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.3)">
      ${r.image ? `<img src="${r.image}" style="width:100%;height:200px;object-fit:cover;border-radius:22px 22px 0 0" />` : `<div style="width:100%;height:160px;background:linear-gradient(135deg,#F0FAF0,#FFF8F0);display:flex;align-items:center;justify-content:center;font-size:56px;border-radius:22px 22px 0 0">🍽️</div>`}
      <div style="padding:24px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
          <div style="font-family:'Lora',serif;font-size:20px;font-weight:700;color:#2D5016;line-height:1.3">${r.title}</div>
          <button onclick="document.getElementById('recipeModal').remove()" style="width:34px;height:34px;border-radius:50%;border:2px solid #E8D5B0;background:white;font-size:16px;cursor:pointer;flex-shrink:0;margin-left:10px">✕</button>

          ${r.servings ? `<span style="background:#F3E5F5;color:#6A1B9A;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:700">👥 ${r.servings} servings</span>` : ""}
          ${r.store_name ? `<span style="background:#F0FAF0;color:#2D5016;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:700">🏪 ${r.store_name}</span>` : ""}
        </div>
        ${r.ingredients?.length ? `
          <div style="margin-bottom:16px">
            <div style="font-size:11px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Ingredients</div>
            <div style="display:flex;flex-wrap:wrap;gap:6px">
              ${r.ingredients.map(i => `<span style="background:#F5F5F5;padding:4px 10px;border-radius:6px;font-size:12px">${i}</span>`).join("")}
            </div>
          </div>` : ""}
        ${r.steps?.length ? `
          <div>
            <div style="font-size:11px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Instructions</div>
            <div style="display:flex;flex-direction:column;gap:10px">
              ${r.steps.map((step, i) => `
                <div style="display:flex;gap:10px;align-items:flex-start">
                  <div style="min-width:24px;height:24px;border-radius:50%;background:#2D5016;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white;flex-shrink:0">${i+1}</div>
                  <div style="font-size:13px;color:#444;line-height:1.6;padding-top:2px">${step}</div>
                </div>
              `).join("")}
            </div>
          </div>` : ""}
        <div style="margin-top:20px;padding-top:16px;border-top:2px solid #F5EFE0">
          <button onclick="document.getElementById('recipeModal').remove()" style="width:100%;padding:12px;background:#2D5016;color:white;border:none;border-radius:12px;font-size:14px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer">Done</button>
        </div>
      </div>
    </div>
  `;
  modal.addEventListener("click", e => { if (e.target === modal) modal.remove(); });
  document.body.appendChild(modal);

async function deleteRecipe(id) {
  const token = await getToken();
  const res = await fetch(`/api/recipes/saved/${id}`, {
    method: "DELETE",
    headers: { Authorization: `Bearer ${token}` },
  });
  if (res.ok) {
    savedRecipes = savedRecipes.filter(r => r.id !== id);
    document.getElementById(`recipe-${id}`)?.remove();
    showToast("Recipe removed");
  } else showToast("Could not delete", "error");
}

function connectKroger() {
  window.location.href = `/auth/kroger?userId=${currentUser.id}`;
}

async function disconnectKroger() {
  const token = await getToken();
  await fetch("/auth/kroger/disconnect", { headers: { Authorization: `Bearer ${token}` } });
  await loadProfileData();
  renderProfile();
  showToast("Kroger account disconnected");
}

async function signOut() {
  await sb.auth.signOut();
  renderAuth();
}

// ── Shopping List from Saved Recipes ─────────────────────────────────────────
function addRecipeToList(id) {
  const recipe = savedRecipes.find(r => r.id === id);
  if (!recipe) return;
  const ings = recipe.ingredients || [];
  if (!ings.length) { showToast("No ingredients found for this recipe", "error"); return; }
  // Show modal with checkboxes
  const modal = document.createElement("div");
  modal.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:400;display:flex;align-items:center;justify-content:center;padding:20px";
  modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
  modal.innerHTML = `<div style="background:white;border-radius:20px;max-width:480px;width:100%;max-height:80vh;overflow-y:auto;padding:24px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div style="font-weight:700;font-size:17px;color:#2d6a4f">🛒 Add to Shopping List</div>
      <button onclick="this.closest('[style*=fixed]').remove()" style="background:none;border:none;font-size:18px;cursor:pointer;color:#999">✕</button>
    </div>
    <p style="font-size:13px;color:#9ca38f;margin-bottom:12px">${escapeHtml(recipe.title)}</p>
    <div id="recipeIngList">${ings.map((name, i) => `<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #e8e0d0">
      <input type="checkbox" checked id="rIng${i}" style="width:16px;height:16px;accent-color:#40916c" />
      <label for="rIng${i}" style="font-size:14px;cursor:pointer">${escapeHtml(typeof name === "string" ? name : name.name || name)}</label>
    </div>`).join("")}</div>
    <button onclick="doAddRecipeToList('${id}', this.closest('[style*=fixed]'))" style="width:100%;margin-top:16px;padding:14px;border:none;border-radius:12px;background:#d97706;color:white;font-size:15px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif">Add Selected to List</button>
  </div>`;
  document.body.appendChild(modal);
}
function doAddRecipeToList(id, modal) {
  const recipe = savedRecipes.find(r => r.id === id);
  const ings = recipe?.ingredients || [];
  const list = JSON.parse(localStorage.getItem("dishcount-shopping-list") || "[]");
  let count = 0;
  ings.forEach((name, i) => {
    const cb = document.getElementById(`rIng${i}`);
    if (!cb?.checked) return;
    const itemName = typeof name === "string" ? name : (name.name || String(name));
    if (list.some(x => x.name === itemName && x.recipeTitle === recipe.title)) return;
    list.push({ id: Date.now() + Math.random(), name: itemName, price: "", store: "", source: "recipe-ingredient", recipeTitle: recipe.title, upc: "" });
    count++;
  });
  localStorage.setItem("dishcount-shopping-list", JSON.stringify(list));
  modal.remove();
  showToast(`Added ${count} items to shopping list!`);
}

// ── Saved Lists Actions ──────────────────────────────────────────────────────
function loadSavedList(id) {
  const list = savedLists.find(l => l.id === id);
  if (!list) return;
  localStorage.setItem("dishcount-shopping-list", JSON.stringify(list.items || []));
  showToast(`Loaded "${list.name}" (${(list.items||[]).length} items)`);
}
function toggleRecipeAccordion(id) {
  const el = document.getElementById(`detail-${id}`);
  const arrow = document.getElementById(`arrow-${id}`);
  if (!el) return;
  const open = el.style.display === "none";
  el.style.display = open ? "block" : "none";
  if (arrow) arrow.textContent = open ? "▲" : "▼";
}
function toggleListAccordion(id) {
  const el = document.getElementById(`ldetail-${id}`);
  const arrow = document.getElementById(`larrow-${id}`);
  if (!el) return;
  const open = el.style.display === "none";
  el.style.display = open ? "block" : "none";
  if (arrow) arrow.textContent = open ? "▲" : "▼";
}
function shareListLink(id) {
  const url = window.location.origin + "/list.html?id=" + id;
  navigator.clipboard.writeText(url).then(() => showToast("Link copied!")).catch(() => showToast("Could not copy"));
}
function emailSavedList(id) {
  const list = savedLists.find(l => l.id === id);
  if (!list) return;
  let text = list.name + "\n" + "=".repeat(30) + "\n";
  (list.items || []).forEach(i => { text += `[ ] ${i.name}${i.price ? " - $" + String(i.price).replace(/^\$/,"") : ""}${i.store ? " (" + i.store + ")" : ""}\n`; });
  text += "\nShared from Dishcount — " + window.location.origin + "/list.html?id=" + id;
  window.open(`mailto:?subject=${encodeURIComponent(list.name)}&body=${encodeURIComponent(text)}`);
}
async function deleteSavedList(id) {
  if (!confirm("Delete this list?")) return;
  const token = await getToken();
  const res = await fetch(`/api/lists/${id}`, { method: "DELETE", headers: { Authorization: `Bearer ${token}` } });
  if (res.ok) {
    savedLists = savedLists.filter(l => l.id !== id);
    renderProfile();
    showToast("List deleted");
  } else showToast("Could not delete", "error");
}

function escapeHtml(str) {
  if (str == null) return "";
  return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;");
}
