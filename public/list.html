    .list-actions { display: flex; gap: 10px; margin-top: 20px; }

    }

  <div style="text-align:center;padding:40px;color:var(--muted)">Loading list...</div>

</footer>

<script>
function escapeHtml(s){return s==null?"":String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

async function loadList() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");
  if (!id) { showEmpty("No list specified"); return; }
  try {
    const res = await fetch(`/api/lists/share/${id}`);
    if (!res.ok) { showEmpty("List not found"); return; }
    const data = await res.json();
    renderList(data);
  } catch (e) { showEmpty("Could not load list"); }
}

function showEmpty(msg) {
  document.getElementById("listMain").innerHTML = `<div class="list-empty"><div class="emoji">📋</div><p>${escapeHtml(msg)}</p><p style="margin-top:12px"><a href="/" style="color:var(--green-mid);font-weight:700;text-decoration:none">Find deals near you →</a></p></div>`;
}

function renderList(data) {
  const items = data.items || [];
  let itemsHtml = "";

  // Recipes — collapsed, title + count only
  const recipeMap = {};
  items.filter(i => i.source === "recipe-ingredient" && i.recipeTitle).forEach(i => {
    if (!recipeMap[i.recipeTitle]) recipeMap[i.recipeTitle] = 0;
    recipeMap[i.recipeTitle]++;
  });
  if (Object.keys(recipeMap).length) {
    itemsHtml += `<div class="list-group-title">Recipes Included</div>`;
    for (const [title, count] of Object.entries(recipeMap)) {
      itemsHtml += `<div class="list-item"><div class="list-item-name">🍽️ ${escapeHtml(title)}</div><div class="list-item-store">${count} ingredients</div></div>`;
    }
  }

  // Recipe ingredients as flat items
  const recipeItems = items.filter(i => i.source === "recipe-ingredient");
  if (recipeItems.length) {
    itemsHtml += `<div class="list-group-title">Ingredients</div>`;
    recipeItems.forEach(item => {
      itemsHtml += `<div class="list-item"><div class="list-item-name">${escapeHtml(item.name)}</div>
        ${item.price ? `<div class="list-item-price">$${escapeHtml(String(item.price).replace(/^\$/,""))}</div>` : ""}</div>`;
    });
  }

  // Store sections
  const dealItems = items.filter(i => i.source === "deal");
  const storeMap = {};
  dealItems.forEach(i => { const s = i.store||"Other"; if(!storeMap[s])storeMap[s]=[]; storeMap[s].push(i); });
  for (const [store, arr] of Object.entries(storeMap)) {
    itemsHtml += `<div class="list-group-title">🏪 ${escapeHtml(store)} (${arr.length} items)</div>`;
    arr.forEach(item => {
      itemsHtml += `<div class="list-item">
        <div><div class="list-item-name">${escapeHtml(item.name)}</div>${item.category ? `<div class="list-item-store">${escapeHtml(item.category)}</div>` : ""}</div>
        ${item.price ? `<div class="list-item-price">$${escapeHtml(String(item.price).replace(/^\$/,""))}</div>` : ""}
      </div>`;
    });
  }

  // Other items
  const otherItems = items.filter(i => i.source !== "deal" && i.source !== "recipe-ingredient");
  if (otherItems.length) {
    itemsHtml += `<div class="list-group-title">Other Items</div>`;
    otherItems.forEach(item => {
      itemsHtml += `<div class="list-item"><div class="list-item-name">${escapeHtml(item.name)}</div>
        ${item.price ? `<div class="list-item-price">$${escapeHtml(String(item.price).replace(/^\$/,""))}</div>` : ""}</div>`;
    });
  }

  document.getElementById("listMain").innerHTML = `<div class="list-card">
    <div class="list-title">${escapeHtml(data.name)}</div>
    <div class="list-meta">${items.length} items · Shared from Dishcount</div>
    ${itemsHtml}
    <div class="list-actions">
      <button onclick="copyList()">📋 Copy List</button>
      <button onclick="emailList()">📧 Email List</button>
    </div>
  </div>`;
  window._listData = data;
}

function getListText() {
  const d = window._listData; if (!d) return "";
  let t = d.name + "\n" + "=".repeat(30) + "\n";
  (d.items||[]).forEach(i => { t += "[ ] " + i.name + (i.price ? " - $" + String(i.price).replace(/^\$/,"") : "") + (i.store ? " (" + i.store + ")" : "") + "\n"; });
  return t;
}

function copyList() {
  navigator.clipboard.writeText(getListText()).then(() => {
    const btn = event.target; btn.textContent = "Copied!"; setTimeout(() => btn.textContent = "📋 Copy List", 1500);
  }).catch(() => alert("Could not copy"));
}

function emailList() {
  const d = window._listData; if (!d) return;
  const text = getListText() + "\nView online: " + window.location.href;
  window.open(`mailto:?subject=${encodeURIComponent(d.name)}&body=${encodeURIComponent(text)}`);
}

loadList();
</script>
