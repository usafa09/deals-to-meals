name: Weekly Deal Cache Refresh

on:
  schedule:
    # Every Wednesday at 10:00 AM EST (14:00 UTC). Shifted from 6 AM
    # after 2026-05-13 investigation found upstream aggregators still
    # publishing the prior week's ads at 6 AM Wednesday. 4-hour buffer.
    - cron: "0 14 * * 3"
    # Friday re-pass at 16:00 UTC. extract-store early-returns for
    # chains whose ad is still valid, so this only re-runs OCR for
    # chains whose Wednesday extraction captured an already-expired
    # ad (source lag).
    - cron: "0 16 * * 5"
  workflow_dispatch:

jobs:
  refresh-deals:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: github.repository == 'usafa09/deals-to-meals'
    env:
      INTERNAL_TOKEN: ${{ secrets.INTERNAL_API_TOKEN }}

    steps:
      - name: Refresh deal caches for top metro areas
        run: |
          BASE="https://dishcount.co/api"
          ZIPS=(
            "45432|Dayton (Kroger, Meijer)"
            "10001|NYC (ShopRite, Stop & Shop)"
            "90210|LA (Ralphs, Vons)"
            "60601|Chicago (Mariano's, Jewel-Osco)"
            "77001|Houston (Kroger, H-E-B)"
            "30301|Atlanta (Kroger, Publix)"
            "98101|Seattle (Fred Meyer, QFC)"
            "33101|Miami (Publix)"
            "85001|Phoenix (Fry's)"
            "48201|Detroit (Kroger, Meijer)"
          )

          for entry in "${ZIPS[@]}"; do
            IFS='|' read -r zip label <<< "$entry"
            echo "::group::$label (zip $zip)"
            echo "Fetching deals for $label..."
            RESPONSE=$(curl -s -w "\n%{http_code}" --max-time 120 "$BASE/deals/regional?zip=$zip")
            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | sed '$d')
            DEAL_COUNT=$(echo "$BODY" | grep -o '"name"' | wc -l)
            echo "Status: $HTTP_CODE | Deals found: ~$DEAL_COUNT"
            if [ "$HTTP_CODE" -ne 200 ]; then
              echo "::warning::$label returned HTTP $HTTP_CODE"
            fi
            echo "::endgroup::"
            echo "Waiting 30s before next request..."
            sleep 30
          done

          # ALDI national deals
          echo "::group::ALDI (national)"
          echo "Fetching ALDI deals..."
          RESPONSE=$(curl -s -w "\n%{http_code}" --max-time 60 "$BASE/aldi/deals")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          DEAL_COUNT=$(echo "$BODY" | grep -o '"name"' | wc -l)
          echo "Status: $HTTP_CODE | Deals found: ~$DEAL_COUNT"
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::warning::ALDI returned HTTP $HTTP_CODE"
          fi
          echo "::endgroup::"

          echo "Done! All deal caches refreshed."

      - name: Extract deals for top stores (OCR pipeline)
        run: |
          BASE="https://dishcount.co/api"
          # IMPORTANT: Keep this list in sync with the STORES array in the "Verify extractions completed" step below.
          STORES=(
            "ALDI|00000|ALDI (national)"
            "Meijer|45432|Meijer (Dayton)"
            "Whole Foods|45432|Whole Foods (Dayton)"
            "Fresh Thyme|45432|Fresh Thyme (Dayton)"
            "Publix|32801|Publix (Orlando)"
            "Albertsons|90001|Albertsons (LA)"
            "Safeway|94102|Safeway (SF)"
            "Food Lion|27601|Food Lion (Raleigh)"
            "Giant Eagle|15201|Giant Eagle (Pittsburgh)"
            "Sprouts|85001|Sprouts (Phoenix)"
            "Harris Teeter|27601|Harris Teeter (Raleigh)"
            "Hy-Vee|50309|Hy-Vee (Des Moines)"
            "ShopRite|07001|ShopRite (NJ)"
            "Stop and Shop|06001|Stop and Shop (CT)"
            "Winn Dixie|32801|Winn Dixie (Orlando)"
            "Piggly Wiggly|35203|Piggly Wiggly (Birmingham)"
            "Save A Lot|45432|Save A Lot (Dayton)"
            "Grocery Outlet|94102|Grocery Outlet (SF)"
            "Market Basket|01801|Market Basket (MA)"
            "Ingles|28801|Ingles (Asheville)"
          )

          for entry in "${STORES[@]}"; do
            IFS='|' read -r store zip label <<< "$entry"
            echo "::group::$label"
            echo "Extracting $label deals..."
            RESPONSE=$(curl -s -w "\n%{http_code}" --max-time 180 -X POST "$BASE/extract-store" \
              -H "Content-Type: application/json" \
              -H "X-Internal-Token: $INTERNAL_TOKEN" \
              -d "{\"storeName\":\"$store\",\"zip\":\"$zip\"}")
            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            # Deal counts reported in verification step below
            echo "Status: $HTTP_CODE"
            if [ "$HTTP_CODE" -ne 200 ]; then
              echo "::warning::$label returned HTTP $HTTP_CODE"
            fi
            echo "::endgroup::"
            echo "Waiting 30s before next extraction..."
            sleep 30
          done
          echo "Done! All store extractions triggered (results verified in next step)."

      - name: Verify extractions (single retry pass)
        id: verify
        run: |
          BASE="https://dishcount.co/api"

          # Single source of truth for this step: "Name|zip".
          # Zips MUST stay in sync with the trigger loop in the
          # "Extract deals for top stores" step above.
          STORES=(
            "ALDI|00000"
            "Meijer|45432"
            "Whole Foods|45432"
            "Fresh Thyme|45432"
            "Publix|32801"
            "Albertsons|90001"
            "Safeway|94102"
            "Food Lion|27601"
            "Giant Eagle|15201"
            "Sprouts|85001"
            "Harris Teeter|27601"
            "Hy-Vee|50309"
            "ShopRite|07001"
            "Stop and Shop|06001"
            "Winn Dixie|32801"
            "Piggly Wiggly|35203"
            "Save A Lot|45432"
            "Grocery Outlet|94102"
            "Market Basket|01801"
            "Ingles|28801"
          )

          # ---- Pass 1: poll every 2 min until all stores ready or 36 min elapse ----
          # Extractions now drain through a server-side semaphore (2 concurrent),
          # so 20 stores take ~25 min. A fixed 6-min sleep would mark queued
          # stores as failures and re-trigger them pointlessly.
          PENDING=("${STORES[@]}")
          POLL_INTERVAL=120
          MAX_POLLS=18
          for ((poll=1; poll<=MAX_POLLS; poll++)); do
            sleep $POLL_INTERVAL
            echo "Poll $poll/$MAX_POLLS — checking ${#PENDING[@]} pending store(s)..."
            STILL_PENDING=()
            for entry in "${PENDING[@]}"; do
              IFS='|' read -r store zip <<< "$entry"
              ENCODED=$(echo "$store" | sed 's/ /%20/g; s/&/%26/g')
              RESPONSE=$(curl -s --max-time 30 "$BASE/extract-status?store=$ENCODED")
              STATUS=$(echo "$RESPONSE" | grep -o '"status":"[^"]*"' | sed 's/.*:"//;s/"//')
              DEALS=$(echo "$RESPONSE" | grep -o '"deals":[0-9]*' | sed 's/.*://')
              if [ "$STATUS" = "ready" ]; then
                if [ "${DEALS:-0}" -lt 10 ]; then
                  echo "🟡 $store: ready with only $DEALS deals (low volume)"
                  echo "::warning::$store ready but only $DEALS deals (low)"
                else
                  echo "🟢 $store: $DEALS deals"
                fi
              else
                STILL_PENDING+=("$entry")
              fi
            done
            PENDING=("${STILL_PENDING[@]}")
            if [ "${#PENDING[@]}" -eq 0 ]; then
              echo "All stores ready after $poll poll(s)."
              break
            fi
          done
          RETRY=("${PENDING[@]}")
          for entry in "${RETRY[@]}"; do
            IFS='|' read -r store zip <<< "$entry"
            echo "🟠 $store: not ready after pass-1 polling, queuing one retry"
          done

          # ---- Single retry pass: re-trigger ONLY the non-ready stores ----
          if [ "${#RETRY[@]}" -gt 0 ]; then
            echo ""
            echo "Retrying ${#RETRY[@]} non-ready store(s), one pass, 30s apart."
            for entry in "${RETRY[@]}"; do
              IFS='|' read -r store zip <<< "$entry"
              echo "Re-triggering $store (zip $zip)..."
              curl -s --max-time 180 -X POST "$BASE/extract-store" \
                -H "Content-Type: application/json" \
                -H "X-Internal-Token: $INTERNAL_TOKEN" \
                -d "{\"storeName\":\"$store\",\"zip\":\"$zip\"}" > /dev/null
              sleep 30
            done
            # Poll retried stores every 2 min, up to 12 min.
            for ((rpoll=1; rpoll<=6; rpoll++)); do
              sleep 120
              REMAINING=0
              for entry in "${RETRY[@]}"; do
                IFS='|' read -r store zip <<< "$entry"
                ENCODED=$(echo "$store" | sed 's/ /%20/g; s/&/%26/g')
                S=$(curl -s --max-time 30 "$BASE/extract-status?store=$ENCODED" | grep -o '"status":"[^"]*"' | sed 's/.*:"//;s/"//')
                if [ "$S" != "ready" ]; then REMAINING=$((REMAINING + 1)); fi
              done
              echo "Retry poll $rpoll/6 — $REMAINING store(s) still pending"
              if [ "$REMAINING" -eq 0 ]; then break; fi
            done
          fi

          # ---- Final verdict: re-check ONLY the retried stores. ----
          # A store that recovers here was a transient burst loss (now green).
          # A store still failing after a retry is a genuine failure (source rot).
          FAIL_COUNT=0
          for entry in "${RETRY[@]}"; do
            IFS='|' read -r store zip <<< "$entry"
            ENCODED=$(echo "$store" | sed 's/ /%20/g; s/&/%26/g')
            RESPONSE=$(curl -s --max-time 30 "$BASE/extract-status?store=$ENCODED")
            STATUS=$(echo "$RESPONSE" | grep -o '"status":"[^"]*"' | sed 's/.*:"//;s/"//')
            DEALS=$(echo "$RESPONSE" | grep -o '"deals":[0-9]*' | sed 's/.*://')
            if [ "$STATUS" = "ready" ]; then
              echo "🟢 $store: recovered on retry ($DEALS deals)"
            else
              echo "🔴 $store: status=${STATUS:-none} after retry (genuine failure, likely source rot)"
              echo "::warning::$store still failing after retry (status=${STATUS:-none}), investigate source"
              FAIL_COUNT=$((FAIL_COUNT + 1))
            fi
          done

          echo ""
          echo "Verification complete. $FAIL_COUNT chain(s) failed after retry."
          echo "fail_count=$FAIL_COUNT" >> $GITHUB_OUTPUT

          if [ "$FAIL_COUNT" -gt 5 ]; then
            echo "::error::More than 5 chains failed extraction after retry, investigate immediately"
            exit 1
          fi

      - name: Refresh homepage preview bundle (deals + recipe)
        run: |
          BASE="https://dishcount.co/api"
          echo "Regenerating homepage preview bundle from fresh Kroger deals..."
          RESP=$(curl -s --max-time 90 -X POST "$BASE/cron/refresh-preview" \
            -H "x-internal-token: $INTERNAL_TOKEN")
          echo "Response: $RESP"
          OK=$(echo "$RESP" | grep -o '"ok":true' || true)
          if [ -n "$OK" ]; then
            TITLE=$(echo "$RESP" | grep -o '"title":"[^"]*"' | sed 's/.*:"//;s/"//')
            echo "✅ Preview bundle refreshed: $TITLE"
          else
            echo "::warning::Preview bundle refresh did not return ok:true — homepage will serve the previous bundle. Response: $RESP"
          fi

      - name: Refresh SSR chain-page bundles
        run: |
          BASE="https://dishcount.co/api"
          # One chain per request. All three in one call exceeds the ~100s gateway
          # timeout and the last chain silently never regenerates.
          for CHAIN in kroger aldi walmart; do
            echo "Refreshing SSR bundle: $CHAIN"
            RESP=$(curl -s --max-time 120 -X POST "$BASE/cron/refresh-ssr?chain=$CHAIN" \
              -H "x-internal-token: $INTERNAL_TOKEN")
            echo "  Response: $RESP"
            if echo "$RESP" | grep -q '"ok":true'; then
              echo "  ✅ $CHAIN refreshed"
            else
              echo "::warning::SSR bundle refresh failed for $CHAIN. The page will serve last week's bundle. Response: $RESP"
            fi
          done

      - name: Health check (verify the live surfaces actually have data)
        run: |
          BASE="https://dishcount.co"
          FAILED=0

          echo "── Homepage preview bundle ──"
          PREVIEW=$(curl -s --max-time 30 "$BASE/api/deals/preview")
          COUNT=$(echo "$PREVIEW" | grep -o '"count":[0-9]*' | head -1 | cut -d: -f2)
          if [ -z "$COUNT" ] || [ "$COUNT" -lt 1 ]; then
            echo "::error::Homepage preview has NO deal cards. The preview section is invisible to every visitor. Response: $PREVIEW"
            FAILED=1
          else
            echo "  ✅ $COUNT deal cards"
          fi

          RECIPE=$(curl -s --max-time 30 "$BASE/api/deals/preview-recipe")
          if echo "$RECIPE" | grep -q '"title"'; then
            TITLE=$(echo "$RECIPE" | grep -o '"title":"[^"]*"' | head -1 | cut -d'"' -f4)
            echo "  ✅ recipe: $TITLE"
          else
            echo "::error::Homepage preview recipe is MISSING. The recipe card is invisible. Response: $RECIPE"
            FAILED=1
          fi

          echo "── SSR chain pages ──"
          for CHAIN in kroger aldi walmart; do
            CODE=$(curl -s --max-time 30 -o /dev/null -w "%{http_code}" "$BASE/deals/$CHAIN")
            if [ "$CODE" = "200" ]; then
              echo "  ✅ /deals/$CHAIN → 200"
            else
              echo "::error::/deals/$CHAIN returned $CODE (503 = empty bundle, the page is dark). This page is in the sitemap and linked from the nav."
              FAILED=1
            fi
          done

          CODE=$(curl -s --max-time 30 -o /dev/null -w "%{http_code}" "$BASE/deals")
          if [ "$CODE" = "200" ]; then
            echo "  ✅ /deals hub → 200"
          else
            echo "::error::/deals hub returned $CODE. The nav's Featured Deals link is broken."
            FAILED=1
          fi

          if [ "$FAILED" = "1" ]; then
            echo ""
            echo "One or more live surfaces have no data. The site is degraded but will NOT look broken to visitors — empty sections hide themselves and the deal pages 503. Re-run the refresh steps, or trigger them manually:"
            echo "  curl -X POST -H \"x-internal-token: \$TOKEN\" https://dishcount.co/api/cron/refresh-preview"
            echo "  curl -X POST -H \"x-internal-token: \$TOKEN\" \"https://dishcount.co/api/cron/refresh-ssr?chain=kroger\"   # and aldi, walmart"
            exit 1
          fi

          echo ""
          echo "All live surfaces have data."
